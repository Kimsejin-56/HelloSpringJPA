<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 목록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 16px; }
        .btn:hover { background: #357abd; }
        .btn-secondary { background: #6c757d; margin-left: 8px; }
        .btn-secondary:hover { background: #545b62; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #4a90d9; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f5f8ff; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .alert-error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; text-decoration: underline; padding: 0; }
        .btn-delete:hover { color: #c0392b; }
        .empty-msg { text-align: center; padding: 30px; color: #999; }
    </style>
</head>
<body>

<h1>카테고리 목록</h1>

<div class="alert-success" th:if="${successMessage}">
    <span th:text="${successMessage}">성공 메시지</span>
</div>

<div class="alert-error" th:if="${errorMessage}">
    <span th:text="${errorMessage}">오류 메시지</span>
</div>

<a class="btn" th:href="@{/categories/create}">+ 카테고리 등록</a>
<a class="btn btn-secondary" th:href="@{/products}">상품 목록으로</a>

<div class="empty-msg" th:if="${#lists.isEmpty(categories)}">
    등록된 카테고리가 없습니다.
</div>

<table th:unless="${#lists.isEmpty(categories)}">
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리명</th>
        <th>작업</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="category : ${categories}">
        <td th:text="${category.id}">1</td>
        <td th:text="${category.name}">전자제품</td>
        <td>
            <form th:action="@{/categories/{id}/delete(id=${category.id})}"
                  method="post"
                  style="display:inline;"
                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<footer style="margin-top:20px; border-top:1px solid #ccc; padding-top:10px;">
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
    <p>학번: 2171234 | 성명: 김세진</p>
</footer>

</body>
</html>
